apiVersion: apps/v1
kind: Deployment
metadata:
  name: nucutils
  labels:
    app: nucutils
    app.kubernetes.io/name: nucutils
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: nucutils
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nucutils
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nucutils
    spec:
      containers:
        - name: nucutils
          # Replace with your actual image registry path
          image: image-registry.openshift-image-registry.svc:5000/NAMESPACE/nucutils:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
